<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pseudo Class</title>

    <style>
        p {
            display: none;
            background-color: darkgray;
            padding: 20px;
        }

        div:hover p {
            display: block;
        }

        a {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            color: red;
        }
    </style>
</head>
<body>

    <div>
        Letakkan kursor disini untuk melihat div element
        <p>Saya adalah elemen p</p>
    </div>

    <br><br>

    <a href="#">Arahkan kursor ke sini</a>

</body>
</html>
