<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Belajar Simple Selector</title>

    <style>
        p {
            text-align: center;
            color: aqua;
            border: 2px solid black;
            padding: 10px;
        }

        #kalimat {
            text-align: left;
            color: red;
            background-color: #f0f0f0;
        }

        .center {
            text-align: center;
            color: chocolate;
            background-color: #fff3e0;
        }

        p.tengah {
            text-align: center;
            color: darkmagenta;
            display: block;
            background-color: #777777;
        }
    </style>
</head>
<body>

    <p>
        Penggunaan CSS sangat membantu web designer dalam menyusun halaman web yang konsisten dan rapi.
    </p>

    <p id="kalimat">
        Ini adalah contoh CSS dengan selector menggunakan ID.
    </p>

    <p class="center">
        CSS dengan class selector dapat digunakan berulang kali pada banyak elemen.
    </p>

    <p class="tengah">
        Ini contoh kombinasi selector antara elemen dan class.
    </p>

</body>
</html>
