<!DOCTYPE html>
<html>
<head>
    <title>Contoh jQuery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f6f9;
        }

        #kotak {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            margin: 20px auto;
            line-height: 100px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Contoh jQuery Sederhana</h1>
    <div id="kotak">Halo jQuery</div>
    <button id="tombol">Klik Disini</button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#tombol").click(function() {
                $("#kotak").hide(1000).show(1000);
            });
        });
    </script>
</body>
</html>
