<!DOCTYPE html>
<html>
<head>
    <title>Menu jQuery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .menu {
            width: 250px;
            margin: 50px auto;
        }

        .menu h3 {
            background-color: #2196F3;
            color: white;
            padding: 15px;
            margin: 0;
            cursor: pointer;
        }

        .submenu {
            display: none;
            background: white;
            border: 1px solid #ccc;
        }

        .submenu a {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid #eee;
        }

        .submenu a:hover {
            background-color: #e3f2fd;
        }
    </style>
</head>
<body>

    <div class="menu">
        <h3>Menu Utama</h3>
        <div class="submenu">
            <a href="#">Home</a>
            <a href="#">Profil</a>
            <a href="#">Galeri</a>
            <a href="#">Kontak</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $("h3").click(function() {
                $(".submenu").slideToggle();
            });
        });
    </script>
</body>
</html>
