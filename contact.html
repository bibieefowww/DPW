<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand" href="#">Contact</a>
      <div>
        <a href="index.html" class="btn btn-light btn-sm">Home</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="mb-4">Form Kontak</h2>
        <p><strong>Nama:</strong> Bintang Nur Aini | <strong>NIM:</strong> 253307012</p>
        <form>
          <div class="mb-3">
            <label class="form-label">Nama</label>
            <input type="text" class="form-control" placeholder="Masukkan nama">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Masukkan email">
          </div>
          <div class="mb-3">
            <label class="form-label">Pesan</label>
            <textarea class="form-control" rows="4" placeholder="Masukkan pesan"></textarea>
          </div>
          <button type="submit" class="btn btn-danger">Kirim</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
