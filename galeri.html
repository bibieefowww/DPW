<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Flexbox</title>
    <style>
        :root {
            --z: 5; 
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .galeri {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 30px auto;
        }

        .item {
            width: calc(var(--z) * 20px);
            height: calc(var(--z) * 20px);
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            background-color: white;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        p {
            text-align: center;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Galeri Foto Menggunakan CSS Flexbox</h1>
    <p>Terdapat 18 item foto. Nilai z dapat diubah sesuai angka terakhir NRP.</p>

    <div class="galeri">
        <div class="item"><img src="gurlss.jpg" alt="Foto 1"></div>
        <div class="item"><img src="chikawa.jpg" alt="Foto 2"></div>
        <div class="item"><img src="imut.jpg" alt="Foto 3"></div>
        <div class="item"><img src="shinchan.jpg" alt="Foto 4"></div>
        <div class="item"><img src="suck.jpg" alt="Foto 5"></div>
        <div class="item"><img src="yippie.jpg" alt="Foto 6"></div>
        <div class="item"><img src="chikawa.jpg" alt="Foto 7"></div>
        <div class="item"><img src="gurlss.jpg" alt="Foto 8"></div>
        <div class="item"><img src="imut.jpg" alt="Foto 9"></div>
        <div class="item"><img src="shinchan.jpg" alt="Foto 10"></div>
        <div class="item"><img src="yippie.jpg" alt="Foto 11"></div>
        <div class="item"><img src="suck.jpg" alt="Foto 12"></div>
        <div class="item"><img src="chikawa.jpg" alt="Foto 13"></div>
        <div class="item"><img src="yippie.jpg" alt="Foto 14"></div>
        <div class="item"><img src="gurlss.jpg" alt="Foto 15"></div>
        <div class="item"><img src="imut.jpg" alt="Foto 16"></div>
        <div class="item"><img src="shinchan.jpg" alt="Foto 17"></div>
        <div class="item"><img src="suck.jpg" alt="Foto 18"></div>
    </div>
</body>
</html>
