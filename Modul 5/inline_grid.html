<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belajar CSS Inline Grid</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
        }

        h1 {
            text-align: center;
        }

        .tempat_grid {
            display: inline-grid; 
            grid-template-columns: auto auto auto;
            background-color: #2196F3;
            padding: 10px;
        }

        .item_grid {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }

        .kesimpulan {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-left: 5px solid #2196F3;
        }
    </style>
</head>

<body>

<h1>Tampilan Inline Grid</h1>

<div class="tempat_grid">
    <div class="item_grid">1</div>
    <div class="item_grid">2</div>
    <div class="item_grid">3</div>
    <div class="item_grid">4</div>
    <div class="item_grid">5</div>
    <div class="item_grid">6</div>
    <div class="item_grid">7</div>
    <div class="item_grid">8</div>
    <div class="item_grid">9</div>
</div>

<div class="kesimpulan">
    Kesimpulan skenario 2 adalah: inline-grid membuat container hanya sebesar isi kontennya, tidak memenuhi lebar penuh seperti grid biasa.
</div>

</body>
</html>
