<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout CSS Grid</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            display: grid;
            grid-template-areas: 
                "header header header"
                "menu main right"
                "footer footer footer";

            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 80px 200px 80px;

            gap: 10px;
            padding: 10px;
        }

        .header {
            grid-area: header;
            background-color: #2196F3;
            color: white;
            text-align: center;
            line-height: 80px;
            font-weight: bold;
        }

        .menu {
            grid-area: menu;
            background-color: #64B5F6;
            text-align: center;
            line-height: 200px;
        }

        .main {
            grid-area: main;
            background-color: #BBDEFB;
            text-align: center;
            line-height: 200px;
        }

        .right {
            grid-area: right;
            background-color: #64B5F6;
            text-align: center;
            line-height: 200px;
        }

        .footer {
            grid-area: footer;
            background-color: #2196F3;
            color: white;
            text-align: center;
            line-height: 80px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">Header</div>
    <div class="menu">Menu</div>
    <div class="main">Main</div>
    <div class="right">Right</div>
    <div class="footer">Footer</div>
</div>

</body>
</html>
